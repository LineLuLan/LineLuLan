<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges" role="img" aria-label="Pixel-art midnight cyberpunk banner with shooting stars">

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#08061a"/>
      <stop offset="35%"  stop-color="#1a0d2e"/>
      <stop offset="65%"  stop-color="#3a1c5a"/>
      <stop offset="92%"  stop-color="#7d2554"/>
      <stop offset="100%" stop-color="#a13a6e"/>
    </linearGradient>

    <linearGradient id="horizonGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff4ecd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff4ecd" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="moonGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f5d6e8"/>
      <stop offset="100%" stop-color="#d896b8"/>
    </linearGradient>
  </defs>

  <!-- ============ SKY ============ -->
  <rect width="1200" height="300" fill="url(#sky)"/>

  <!-- ============ MOON ============ -->
  <g>
    <circle cx="985" cy="78" r="80" fill="#ff6b9d" opacity="0.05"/>
    <circle cx="985" cy="78" r="55" fill="#ff6b9d" opacity="0.09"/>
    <circle cx="985" cy="78" r="34" fill="url(#moonGlow)"/>
    <rect x="972" y="68" width="6" height="6" fill="#b87aa3" opacity="0.55"/>
    <rect x="994" y="86" width="4" height="4" fill="#b87aa3" opacity="0.55"/>
    <rect x="978" y="92" width="3" height="3" fill="#b87aa3" opacity="0.55"/>
    <rect x="996" y="70" width="3" height="3" fill="#b87aa3" opacity="0.40"/>
  </g>

  <!-- ============ TWINKLING PIXEL STARS ============ -->
  <g fill="#f5d6e8">
    <rect x="60"   y="40"  width="2" height="2"><animate attributeName="opacity" values="1;0.1;1"   dur="2.4s" repeatCount="indefinite"/></rect>
    <rect x="140"  y="70"  width="3" height="3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></rect>
    <rect x="220"  y="30"  width="2" height="2"><animate attributeName="opacity" values="1;0.3;1"   dur="2.0s" repeatCount="indefinite"/></rect>
    <rect x="300"  y="90"  width="2" height="2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/></rect>
    <rect x="380"  y="50"  width="3" height="3"><animate attributeName="opacity" values="1;0.2;1"   dur="3.6s" repeatCount="indefinite"/></rect>
    <rect x="460"  y="110" width="2" height="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></rect>
    <rect x="540"  y="35"  width="2" height="2"><animate attributeName="opacity" values="1;0.1;1"   dur="3.0s" repeatCount="indefinite"/></rect>
    <rect x="620"  y="85"  width="3" height="3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></rect>
    <rect x="700"  y="55"  width="2" height="2"><animate attributeName="opacity" values="1;0.3;1"   dur="3.4s" repeatCount="indefinite"/></rect>
    <rect x="780"  y="120" width="2" height="2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.0s" repeatCount="indefinite"/></rect>
    <rect x="860"  y="40"  width="2" height="2"><animate attributeName="opacity" values="1;0.2;1"   dur="2.8s" repeatCount="indefinite"/></rect>
    <rect x="900"  y="150" width="3" height="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/></rect>
    <rect x="1060" y="60"  width="2" height="2"><animate attributeName="opacity" values="1;0.4;1"   dur="2.2s" repeatCount="indefinite"/></rect>
    <rect x="1130" y="100" width="2" height="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></rect>
    <rect x="1170" y="35"  width="2" height="2"><animate attributeName="opacity" values="1;0.3;1"   dur="2.6s" repeatCount="indefinite"/></rect>
    <rect x="20"   y="120" width="2" height="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></rect>
    <rect x="180"  y="160" width="2" height="2"><animate attributeName="opacity" values="1;0.1;1"   dur="3.0s" repeatCount="indefinite"/></rect>
    <rect x="500"  y="170" width="2" height="2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/></rect>
    <rect x="660"  y="155" width="2" height="2"><animate attributeName="opacity" values="1;0.2;1"   dur="3.4s" repeatCount="indefinite"/></rect>
    <rect x="820"  y="170" width="2" height="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.0s" repeatCount="indefinite"/></rect>
  </g>

  <!-- ============ DISTANT NEON CITY SKYLINE ============ -->
  <g fill="#0d061a">
    <rect x="0"    y="225" width="50" height="75"/>
    <rect x="50"   y="210" width="35" height="90"/>
    <rect x="85"   y="240" width="60" height="60"/>
    <rect x="145"  y="200" width="40" height="100"/>
    <rect x="185"  y="220" width="55" height="80"/>
    <rect x="240"  y="245" width="45" height="55"/>
    <rect x="285"  y="215" width="50" height="85"/>
    <rect x="335"  y="235" width="65" height="65"/>
    <rect x="400"  y="205" width="40" height="95"/>
    <rect x="440"  y="230" width="55" height="70"/>
    <rect x="495"  y="245" width="50" height="55"/>
    <rect x="545"  y="220" width="45" height="80"/>
    <rect x="590"  y="240" width="60" height="60"/>
    <rect x="650"  y="210" width="40" height="90"/>
    <rect x="690"  y="235" width="55" height="65"/>
    <rect x="745"  y="225" width="50" height="75"/>
    <rect x="795"  y="245" width="65" height="55"/>
    <rect x="860"  y="215" width="40" height="85"/>
    <rect x="900"  y="240" width="55" height="60"/>
    <rect x="955"  y="225" width="45" height="75"/>
    <rect x="1000" y="200" width="35" height="100"/>
    <rect x="1035" y="240" width="60" height="60"/>
    <rect x="1095" y="220" width="50" height="80"/>
    <rect x="1145" y="245" width="55" height="55"/>
  </g>

  <!-- Lit pixel windows -->
  <g>
    <rect x="60"   y="220" width="3" height="3" fill="#ff4ecd"><animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite"/></rect>
    <rect x="68"   y="220" width="3" height="3" fill="#a855f7" opacity="0.8"/>
    <rect x="155"  y="215" width="3" height="3" fill="#ff6b9d"/>
    <rect x="155"  y="225" width="3" height="3" fill="#ff6b9d" opacity="0.6"/>
    <rect x="170"  y="215" width="3" height="3" fill="#a855f7"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/></rect>
    <rect x="295"  y="225" width="3" height="3" fill="#ff4ecd"/>
    <rect x="305"  y="225" width="3" height="3" fill="#ff4ecd" opacity="0.7"/>
    <rect x="410"  y="220" width="3" height="3" fill="#a855f7"><animate attributeName="opacity" values="1;0.2;1" dur="3.0s" repeatCount="indefinite"/></rect>
    <rect x="555"  y="230" width="3" height="3" fill="#ff6b9d"/>
    <rect x="660"  y="225" width="3" height="3" fill="#ff4ecd" opacity="0.85"/>
    <rect x="668"  y="235" width="3" height="3" fill="#a855f7"/>
    <rect x="755"  y="235" width="3" height="3" fill="#ff6b9d"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/></rect>
    <rect x="870"  y="225" width="3" height="3" fill="#a855f7" opacity="0.75"/>
    <rect x="965"  y="235" width="3" height="3" fill="#ff4ecd"/>
    <rect x="1010" y="215" width="3" height="3" fill="#ff6b9d"><animate attributeName="opacity" values="1;0.4;1" dur="3.4s" repeatCount="indefinite"/></rect>
    <rect x="1018" y="225" width="3" height="3" fill="#a855f7" opacity="0.8"/>
    <rect x="1105" y="230" width="3" height="3" fill="#ff4ecd"/>
  </g>

  <!-- Neon horizon line + bloom -->
  <rect x="0" y="247" width="1200" height="2" fill="#ff4ecd" opacity="0.85"/>
  <rect x="0" y="249" width="1200" height="55" fill="url(#horizonGlow)"/>

  <!-- ============ SHOOTING STARS ============ -->
  <!-- Each is a head pixel + decaying-pink trail; translate diagonally across canvas. -->
  <g>
    <g>
      <rect x="0"   y="0" width="4" height="4" fill="#ffffff"/>
      <rect x="-7"  y="1" width="7" height="2" fill="#ff6b9d" opacity="0.85"/>
      <rect x="-16" y="1" width="9" height="2" fill="#a855f7" opacity="0.55"/>
      <rect x="-28" y="1" width="12" height="2" fill="#3a1c71" opacity="0.30"/>
      <animateTransform attributeName="transform" type="translate"
        values="-60,10; 1320,260" keyTimes="0;1" dur="3.2s" begin="0s" repeatCount="indefinite"/>
    </g>

    <g>
      <rect x="0"   y="0" width="3" height="3" fill="#f5d6e8"/>
      <rect x="-6"  y="0" width="6" height="2" fill="#ff4ecd" opacity="0.8"/>
      <rect x="-14" y="0" width="8" height="2" fill="#a855f7" opacity="0.45"/>
      <animateTransform attributeName="transform" type="translate"
        values="-60,40; 1320,280" keyTimes="0;1" dur="4.6s" begin="1.4s" repeatCount="indefinite"/>
    </g>

    <g>
      <rect x="0"   y="0" width="4" height="4" fill="#ffffff"/>
      <rect x="-8"  y="1" width="8" height="2" fill="#ff6b9d" opacity="0.85"/>
      <rect x="-18" y="1" width="10" height="2" fill="#a855f7" opacity="0.5"/>
      <rect x="-30" y="1" width="12" height="2" fill="#3a1c71" opacity="0.25"/>
      <animateTransform attributeName="transform" type="translate"
        values="-60,80; 1320,300" keyTimes="0;1" dur="5.2s" begin="2.8s" repeatCount="indefinite"/>
    </g>

    <g>
      <rect x="0"   y="0" width="3" height="3" fill="#ffffff"/>
      <rect x="-5"  y="0" width="5" height="2" fill="#ff4ecd" opacity="0.85"/>
      <rect x="-12" y="0" width="7" height="2" fill="#7d2554" opacity="0.5"/>
      <animateTransform attributeName="transform" type="translate"
        values="-60,120; 1320,320" keyTimes="0;1" dur="3.8s" begin="4.1s" repeatCount="indefinite"/>
    </g>

    <g>
      <rect x="0"   y="0" width="4" height="4" fill="#f5d6e8"/>
      <rect x="-7"  y="1" width="7" height="2" fill="#ff6b9d" opacity="0.85"/>
      <rect x="-16" y="1" width="9" height="2" fill="#a855f7" opacity="0.5"/>
      <animateTransform attributeName="transform" type="translate"
        values="-60,30; 1320,250" keyTimes="0;1" dur="4.2s" begin="5.5s" repeatCount="indefinite"/>
    </g>
  </g>

</svg>
